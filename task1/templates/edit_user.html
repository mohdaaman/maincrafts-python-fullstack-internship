<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="form-section">

        <h1>Edit User</h1>

        <form method="POST">

            <input
                type="text"
                name="name"
                value="{{ user.name }}"
                required
            >

            <input
                type="email"
                name="email"
                value="{{ user.email }}"
                required
            >

            <input
                type="text"
                name="phone"
                value="{{ user.phone }}"
                required
            >

            <input
                type="text"
                name="department"
                value="{{ user.department }}"
                required
            >

            <button type="submit">
                Update User
            </button>

        </form>

        <br>

        <a href="{{ url_for('index') }}">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
